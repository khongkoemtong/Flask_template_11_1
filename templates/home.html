<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block name %}
        homepage
        {% endblock %}

    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>


    {% block page %}


    <div class="d-flex justify-content-end m-5">
        <button class="btn btn-primary" data-bs-target="#hello" style="margin-right: 100px;"
            data-bs-toggle="modal">Adduser</button>
    </div>

    <div class="modal fade" id="hello">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/insert" enctype="multipart/form-data" method="post" class="p-5">
                    <p class="text-center fs-2 fw-bold">Adduser</p>
                    <div>
                        <label for="" class="form-label">Enter name</label>
                        <input type="text" name="username" class="form-control">
                    </div>
                    <div>
                        <label for="" class="form-label">Enter age</label>
                        <input type="number" name="age" class="form-control">
                    </div>
                    <div>
                        <label for="" class="form-label">Enter gender</label>
                        <input type="text" name="gender" class="form-control">
                    </div>
                    <div>
                        <label for="" class="form-label">Enter Salary</label>
                        <input type="number" name="salary" class="form-control">
                    </div>

                    <div>
                        <label for="" class="form-label">Enter Image</label>
                        <input type="file" id="imageInput" name="image" class="form-control">
                    </div>



                    <div>
                        <img width="100% " id="preview" class="mt-3"
                            src="https://i.pinimg.com/736x/28/45/9a/28459a8b39c2344ef865db14b79ade25.jpg" alt="">
                    </div>

                    <div>
                        <button class="btn btn-primary" type="submit">Submit</button>
                    </div>


                </form>
            </div>
        </div>

    </div>



    <table class="table align-middle text-center w-75 table-bordered mt-5" align="center">
        <thead>
            <tr class="table-primary">
                <th scope="col">#</th>
                <th scope="col">NAME</th>
                <th scope="col">AGE</th>
                <th scope="col">GENDER</th>
                <th>SALARY</th>
                <th>ACTION</th>
                <th>IMAGE</th>
            </tr>
        </thead>
        <tbody>

            {% for mydata in user %}

            <tr>
                <th scope="row">{{mydata[0]}}</th>
                <td>{{mydata[1]}}</td>
                <td>{{mydata[2]}}</td>
                <td>{{mydata[3]}}</td>
                <td>{{mydata[4]}}</td>
                <td>
                    <button class="btn btn-warning" data-bs-toggle="modal"
                        data-bs-target="#update{{mydata[0]}}">Update</button>
                    <button class="btn btn-danger" data-bs-target="#delete{{mydata[0]}}"
                        data-bs-toggle="modal">Delete</button>
                </td>
                <td>
                    <img src="{{ url_for('static', filename='uploads/'+ mydata[5])}}" width="80px" alt="">
                </td>
            </tr>



            <div class="modal fade" id="update{{mydata[0]}}">
                <div class="modal-dialog">
                    <div class="modal-content p-5">
                        <form action="/update" method="post" class="">
                            <p class="text-center fs-2 fw-bold">Update</p>
                            <div>

                                <input type="hidden" value="{{mydata[0]}}" name="update_id" class="form-control">
                            </div>
                            <div>
                                <label for="" class="form-label">Enter name</label>
                                <input type="text" value="{{mydata[1]}}" name="update_username" class="form-control">
                            </div>
                            <div>
                                <label for="" class="form-label">Enter age</label>
                                <input type="number" name="update_age" value="{{mydata[2]}}" class="form-control">
                            </div>
                            <div>
                                <label for="" class="form-label">Enter gender</label>
                                <input type="text" name="update_gender" value="{{mydata[3]}}" class="form-control">
                            </div>
                            <div>
                                <label for="" class="form-label">Enter Salary</label>
                                <input type="number" name="update_salary" value="{{mydata[4]}}" class="form-control">
                            </div>

                            <div>
                                <button class="btn btn-primary" type="submit">Submit</button>
                            </div>


                        </form>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="delete{{mydata[0]}}">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <p class="text-center fs-2  fw-bold">Are you sure ?</p>
                        <form action="/delete" method="post">
                            <input type="hidden" name="id" value="{{mydata[0]}}">

                            <div class="d-flex justify-content-center gap-1 p-4">

                                <button class="btn btn-primary" type="submit">Confirm</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>


            {%endfor%}


        </tbody>
    </table>





    {% endblock%}

</body>

<script>

    const imageInput = document.getElementById("imageInput")
    const preview = document.getElementById('preview')


    imageInput.addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
            const reader = new FileReader();

            reader.addEventListener("load", function () {
                preview.src = reader.result;
            });
            reader.readAsDataURL(file);
        }



    })



</script>

</html>
