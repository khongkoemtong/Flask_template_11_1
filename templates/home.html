<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- ADD USER -->
<div class="d-flex justify-content-end m-5">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#hello">
        Adduser
    </button>
</div>

<div class="modal fade" id="hello">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="/insert" enctype="multipart/form-data" method="post" class="p-5">

                <p class="text-center fs-2 fw-bold">Adduser</p>

                <input type="text" name="username" class="form-control mb-2" placeholder="Name">
                <input type="number" name="age" class="form-control mb-2" placeholder="Age">
                <input type="text" name="gender" class="form-control mb-2" placeholder="Gender">
                <input type="number" name="salary" class="form-control mb-2" placeholder="Salary">

                <input type="file" id="imageInput" name="image" class="form-control mb-2">

                <img id="preview" width="100%" class="mt-3"
                     src="https://i.pinimg.com/736x/28/45/9a/28459a8b39c2344ef865db14b79ade25.jpg">

                <button class="btn btn-primary mt-3" type="submit">Submit</button>

            </form>
        </div>
    </div>
</div>



<div class="w-75 mb-5">
   <form action="/search"  class="d-flex justify-content-center gap-3">
     <input type="text" name="search"  class=" w-50  form-control">
     <button class="btn btn-success">Search</button>
   </form>
</div>
<!-- TABLE -->
<table class="table text-center align-middle w-75 table-bordered m-auto">
    <thead class="table-primary">
    <tr>
        <th>#</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Salary</th>
        <th>Action</th>
        <th>Image</th>
    </tr>
    </thead>

    <tbody>
    {% for mydata in user %}
    <tr>
        <td>{{mydata[0]}}</td>
        <td>{{mydata[1]}}</td>
        <td>{{mydata[2]}}</td>
        <td>{{mydata[3]}}</td>
        <td>{{mydata[4]}}</td>

        <td>
            <button class="btn btn-warning" data-bs-toggle="modal"
                    data-bs-target="#update{{mydata[0]}}">Update</button>

            <button class="btn btn-danger" data-bs-toggle="modal"
                    data-bs-target="#delete{{mydata[0]}}">Delete</button>
        </td>

        <td>
            <img src="{{ url_for('static', filename='uploads/'+ mydata[5])}}" height="80" width="80">
        </td>
    </tr>


    <!-- UPDATE MODAL -->
    <div class="modal fade" id="update{{mydata[0]}}">
        <div class="modal-dialog">
            <div class="modal-content p-4">

                <form action="/update" enctype="multipart/form-data" method="post">

                    <input type="hidden" name="update_id" value="{{mydata[0]}}">

                    <input type="text" name="update_username"
                           value="{{mydata[1]}}" class="form-control mb-2">

                    <input type="number" name="update_age"
                           value="{{mydata[2]}}" class="form-control mb-2">

                    <input type="text" name="update_gender"
                           value="{{mydata[3]}}" class="form-control mb-2">

                    <input type="number" name="update_salary"
                           value="{{mydata[4]}}" class="form-control mb-2">

                    <!-- IMPORTANT PART -->
                    <input type="file"
                           class="form-control updateImage"
                           data-id="{{mydata[0]}}">

                    <img class="update_preview mt-3"
                         data-id="{{mydata[0]}}"
                         src="{{ url_for('static', filename='uploads/' + mydata[5]) }}"
                         width="100%">

                    <button class="btn btn-primary mt-3" type="submit">
                        Submit
                    </button>

                </form>
            </div>
        </div>
    </div>


    <!-- DELETE MODAL -->
    <div class="modal fade" id="delete{{mydata[0]}}">
        <div class="modal-dialog">
            <div class="modal-content p-4 text-center">

                <p class="fw-bold">Are you sure?</p>

                <form action="/delete" method="post">
                    <input type="hidden" name="id" value="{{mydata[0]}}">

                    <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Cancel</button>

                    <button type="submit" class="btn btn-danger">
                        Confirm
                    </button>
                </form>

            </div>
        </div>
    </div>

    {% endfor %}
    </tbody>
</table>


<!-- JS -->
<script>

    // ADD PREVIEW
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");

    imageInput.addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = e => preview.src = e.target.result;
            reader.readAsDataURL(file);
        }
    });


    // UPDATE PREVIEW (FIXED)
    const inputs = document.querySelectorAll(".updateImage");

    inputs.forEach(input => {
        input.addEventListener("change", function () {

            const file = this.files[0];
            const id = this.dataset.id;

            const preview = document.querySelector(
                `.update_preview[data-id="${id}"]`
            );

            if (file) {
                const reader = new FileReader();
                reader.onload = e => preview.src = e.target.result;
                reader.readAsDataURL(file);
            }

        });
    });

</script>

</body>
</html>
